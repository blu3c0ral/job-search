name: Tailor Resume (Single Job)

on:
  workflow_dispatch:
    inputs:
      platform:
        description: "Source platform (e.g. Ashby, Greenhouse, Lever, Web)"
        required: true
        type: string
      job_id:
        description: "Job ID (the id column value)"
        required: true
        type: string

jobs:
  tailor:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - run: pip install -r requirements.txt

      - run: python tailor_single_job.py --platform "${{ inputs.platform }}" --id "${{ inputs.job_id }}"
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          PROFILE_YAML: ${{ secrets.PROFILE_YAML }}
          RESUME_TAILOR_CONFIG: ${{ secrets.RESUME_TAILOR_CONFIG }}
          RESUME_STORAGE_PATH: ${{ secrets.RESUME_STORAGE_PATH }}
